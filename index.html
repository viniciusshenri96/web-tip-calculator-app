<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="assets/css/style.css">
  <title>Tip calculator app</title>
</head>

<body>
  <header class="header">
    <img src="assets/images/logo.svg" alt="logo splitter">
  </header>

  <main class="main">
    <section class="calculator">
      <form action="" class="calculator__form">
        <div class="calculator__bill">
          <label for="bill">Bill</label>
          <input class="bill" type="number" oninput="if(this.value.length > 6) this.value = this.value.slice(0, 6)" id="bill" name="bill">
        </div>



        <div class=" calculator__tip">
          <label for="tip">Select Tip %</label>
          <div class="calculator__buttons">
            <button class="btn">5%</button>
            <button class="btn">10%</button>
            <button class="btn">15%</button>
            <button class="btn">25%</button>
            <button class="btn">50%</button>
            <input class="btn__custom" type="number" id="tip" name="tip" placeholder="Custom">
          </div>
        </div>



        <div class="calculator__people">
          <label for="people" class="error ">Number of People <span>Can’t be zero</span></label>
          <input class="people" type="number" id="people" name="people" oninput="if(this.value.length > 6) this.value = this.value.slice(0, 6)">
        </div>
      </form>

      <div class="calculator__calc">
        <div class="calculator__calc-container">
          <p class="calculator__amount">Tip Amount <span>/ person</span></p>
          <p class="calculator__value">$0.0</p>
        </div>
        <div class="calculator__calc-container">
          <p class="calculator__amount">Total <span>/ person</span></p>
          <p class="calculator__value">$0.0</p>
        </div>
        <button class=" btn__reset">Reset</button>
      </div>
    </section>
  </main>

  <script src="assets/js/script.js"></script>
</body>

</html>
